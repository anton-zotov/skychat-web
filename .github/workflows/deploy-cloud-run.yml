name: Deploy Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Write Firebase config from GitHub secret
        run: |
          cat <<'EOF' > firebase-applet-config.json
          ${{ secrets.FIREBASE_APPLET_CONFIG_JSON }}
          EOF

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          source: .
          flags: >-
            --allow-unauthenticated
            --set-env-vars=GIPHY_API_KEY=${{ secrets.GIPHY_API_KEY }},VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }},VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}

      - run: 'echo "Cloud Run URL: ${{ steps.deploy.outputs.url }}"'
